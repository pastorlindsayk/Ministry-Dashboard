<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministry Task Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E4E2DB;
    --text-primary: #1A1916;
    --text-secondary: #6B6860;
    --text-muted: #A8A59E;
    --high: #C0392B;
    --high-bg: #FDF0EE;
    --high-border: #F0C0BB;
    --medium: #D97706;
    --medium-bg: #FFFBF0;
    --medium-border: #F0DFA0;
    --low: #2E7D52;
    --low-bg: #F0FAF4;
    --low-border: #B0DFC0;
    --done: #A8A59E;
    --done-bg: #F7F6F2;
    --charity1: #5B4FCF;
    --charity1-bg: #F2F0FF;
    --charity2: #0E7490;
    --charity2-bg: #F0FAFF;
    --both-bg: #FFF8F0;
    --both: #C2680A;
    --accent: #5B4FCF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--text-primary);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-left p {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  #last-updated {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
  }

  button {
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    transition: opacity 0.15s;
  }

  button:hover { opacity: 0.85; }

  .btn-refresh {
    background: rgba(255,255,255,0.12);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .btn-refresh:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* SETUP BANNER */
  #setup-banner {
    background: #FFF8E7;
    border-bottom: 1px solid #F0DFA0;
    padding: 14px 24px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  #setup-banner .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  #setup-banner p {
    font-size: 13px;
    color: #7A5C00;
    line-height: 1.5;
  }

  #setup-banner code {
    background: rgba(0,0,0,0.07);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
    font-family: monospace;
  }

  /* STATS BAR */
  #stats-bar {
    display: flex;
    gap: 12px;
    padding: 16px 24px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-pill .count {
    font-weight: 700;
    font-size: 14px;
  }

  .stat-pill.high .count { color: var(--high); }
  .stat-pill.medium .count { color: var(--medium); }
  .stat-pill.low .count { color: var(--low); }

  /* FILTERS */
  #filters {
    padding: 0 24px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
  }

  .filter-btn.active {
    background: var(--text-primary);
    color: white;
    border-color: var(--text-primary);
  }

  /* MAIN CONTENT */
  main {
    padding: 0 24px 40px;
  }

  /* SECTION */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 24px 0 12px;
  }

  .section-header h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }

  .section-count {
    background: var(--border);
    color: var(--text-secondary);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 11px;
    font-weight: 600;
  }

  .section-header.high h2 { color: var(--high); }
  .section-header.high .section-count { background: var(--high-bg); color: var(--high); }
  .section-header.medium h2 { color: var(--medium); }
  .section-header.medium .section-count { background: var(--medium-bg); color: var(--medium); }
  .section-header.low h2 { color: var(--low); }
  .section-header.low .section-count { background: var(--low-bg); color: var(--low); }

  /* TASK CARD */
  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: box-shadow 0.15s;
    border-left-width: 3px;
  }

  .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .task-card.priority-High { border-left-color: var(--high); }
  .task-card.priority-Medium { border-left-color: var(--medium); }
  .task-card.priority-Low { border-left-color: var(--low); }
  .task-card.status-done { opacity: 0.5; }
  .task-card.status-done .task-title { text-decoration: line-through; }

  .task-checkbox {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
  }

  .task-checkbox:hover { border-color: var(--accent); }
  .task-checkbox.checked { background: var(--low); border-color: var(--low); }
  .task-checkbox.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }

  .task-body { flex: 1; min-width: 0; }

  .task-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
    color: var(--text-primary);
  }

  .task-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .tag-charity1 { background: var(--charity1-bg); color: var(--charity1); }
  .tag-charity2 { background: var(--charity2-bg); color: var(--charity2); }
  .tag-both { background: var(--both-bg); color: var(--both); }
  .tag-category { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }

  .task-notes {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 6px;
    line-height: 1.4;
  }

  .task-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .empty-state .emoji { font-size: 32px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  /* ERROR STATE */
  #error-banner {
    background: var(--high-bg);
    border: 1px solid var(--high-border);
    border-radius: 8px;
    padding: 14px 16px;
    margin: 16px 0;
    font-size: 13px;
    color: var(--high);
    display: none;
  }

  /* LOADING */
  #loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* DONE SECTION TOGGLE */
  .done-toggle {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    padding: 8px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    margin-top: 24px;
  }

  .done-toggle:hover { color: var(--text-secondary); opacity: 1; }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    header { padding: 16px; }
    #stats-bar, #filters, main { padding-left: 16px; padding-right: 16px; }
    .task-card { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Ministry Task Manager</h1>
    <p id="last-updated">Loading tasks...</p>
  </div>
  <div class="header-right">
    <span id="last-updated-time"></span>
    <button class="btn-refresh" id="refresh-btn" onclick="loadTasks()">↻ Refresh</button>
  </div>
</header>

<div id="setup-banner">
  <div class="icon">⚙️</div>
  <p>
    <strong>One-time setup:</strong> Open this file in a text editor, find <code>YOUR_SHEET_CSV_URL_HERE</code> near the top of the script section, and replace it with your Google Sheet CSV URL. Save the file and reopen it in your browser.
  </p>
</div>

<div id="stats-bar"></div>
<div id="filters"></div>

<main>
  <div id="error-banner"></div>
  <div id="loading">
    <div class="spinner"></div>
    Loading your tasks...
  </div>
  <div id="task-container" style="display:none"></div>
</main>

<script>
  // ============================================
  // REPLACE THIS URL WITH YOUR GOOGLE SHEET CSV URL
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVco2CDRgZXT74q6VOVbwAyYHxr5b9ZYRGKRrcwA7JVN1nVu2sJdQczabd__Kor8NyN8SVRkAvUZIR/pub?gid=0&single=true&output=csv";
  // ============================================

  let allTasks = [];
  let doneVisible = false;
  let activeFilter = 'All';
  let activeCharity = 'All';

  // Load completed tasks from localStorage
  const getDoneSet = () => new Set(JSON.parse(localStorage.getItem('doneTasks') || '[]'));
  const saveDone = (set) => localStorage.setItem('doneTasks', JSON.stringify([...set]));

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    return lines.slice(1).map(line => {
      const values = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') { inQuotes = !inQuotes; }
        else if (line[i] === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
        else { current += line[i]; }
      }
      values.push(current.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = (values[i] || '').replace(/"/g, '').trim());
      return obj;
    }).filter(t => t.Task && t.Task.length > 0);
  }

  async function loadTasks() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '↻ Refreshing...';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('task-container').style.display = 'none';
    document.getElementById('error-banner').style.display = 'none';

    if (SHEET_CSV_URL === 'YOUR_SHEET_CSV_URL_HERE') {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('task-container').style.display = 'block';
      document.getElementById('task-container').innerHTML = `
        <div class="empty-state">
          <div class="emoji">👆</div>
          <p>Follow the setup instructions in the yellow banner above to connect your Google Sheet.</p>
        </div>`;
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
      return;
    }

    try {
      const url = SHEET_CSV_URL + '&t=' + Date.now();
      const res = await fetch(url);
      if (!res.ok) throw new Error('Could not fetch sheet');
      const text = await res.text();
      allTasks = parseCSV(text);

      const doneSet = getDoneSet();
      allTasks = allTasks.map((t, i) => ({
        ...t,
        _id: `${t.Timestamp}-${i}`,
        _done: doneSet.has(`${t.Timestamp}-${i}`) || t.Status?.toLowerCase() === 'done'
      }));

      renderAll();
      document.getElementById('last-updated').textContent = `${allTasks.length} tasks loaded`;
      document.getElementById('last-updated-time').textContent = '';
      const now = new Date();
      document.getElementById('last-updated').textContent =
        `Updated ${now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'})} · ${allTasks.length} tasks`;

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('task-container').style.display = 'block';
      const eb = document.getElementById('error-banner');
      eb.style.display = 'block';
      eb.textContent = 'Could not load tasks. Check your sheet URL is published correctly and try refreshing.';
    }

    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }

  function renderAll() {
    renderStats();
    renderFilters();
    renderTasks();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('task-container').style.display = 'block';
  }

  function renderStats() {
    const active = allTasks.filter(t => !t._done);
    const high = active.filter(t => t.Priority?.toLowerCase() === 'high').length;
    const medium = active.filter(t => t.Priority?.toLowerCase() === 'medium').length;
    const low = active.filter(t => t.Priority?.toLowerCase() === 'low').length;
    document.getElementById('stats-bar').innerHTML = `
      <div class="stat-pill high"><span class="count">${high}</span> High</div>
      <div class="stat-pill medium"><span class="count">${medium}</span> Medium</div>
      <div class="stat-pill low"><span class="count">${low}</span> Low</div>
      <div class="stat-pill"><span class="count">${active.length}</span> Total active</div>
    `;
  }

  function renderFilters() {
    const charities = ['All', 'Charity 1', 'Charity 2', 'Both'];
    document.getElementById('filters').innerHTML =
      charities.map(c => `
        <button class="filter-btn ${activeCharity === c ? 'active' : ''}"
          onclick="setCharityFilter('${c}')">${c === 'All' ? '🏠 All' : c === 'Both' ? '🤝 Both' : c === 'Charity 1' ? '⛪ ' + c : '🤲 ' + c}</button>
      `).join('');
  }

  function setCharityFilter(charity) {
    activeCharity = charity;
    renderFilters();
    renderTasks();
  }

  function renderTasks() {
    const container = document.getElementById('task-container');
    let tasks = allTasks.filter(t => !t._done);

    if (activeCharity !== 'All') {
      tasks = tasks.filter(t => {
        const c = (t.Charity || '').toLowerCase();
        if (activeCharity === 'Both') return c === 'both';
        if (activeCharity === 'Charity 1') return c.includes('1') || c === 'charity 1';
        if (activeCharity === 'Charity 2') return c.includes('2') || c === 'charity 2';
        return true;
      });
    }

    const high = tasks.filter(t => t.Priority?.toLowerCase() === 'high');
    const medium = tasks.filter(t => t.Priority?.toLowerCase() === 'medium');
    const low = tasks.filter(t => !['high','medium'].includes(t.Priority?.toLowerCase()));
    const done = allTasks.filter(t => t._done);

    let html = '';

    if (tasks.length === 0 && done.length === 0) {
      html = `<div class="empty-state"><div class="emoji">✨</div><p>No tasks yet. Send a message to your Telegram bot to get started.</p></div>`;
    } else if (tasks.length === 0) {
      html = `<div class="empty-state"><div class="emoji">🎉</div><p>All tasks complete!</p></div>`;
    } else {
      if (high.length) html += renderSection('High Priority', high, 'high');
      if (medium.length) html += renderSection('Medium Priority', medium, 'medium');
      if (low.length) html += renderSection('Low Priority', low, 'low');
    }

    if (done.length) {
      html += `<button class="done-toggle" onclick="toggleDone()">
        ${doneVisible ? '▾' : '▸'} Completed tasks (${done.length})
      </button>`;
      if (doneVisible) html += renderSection('Completed', done, 'done');
    }

    container.innerHTML = html;
  }

  function renderSection(title, tasks, cls) {
    return `
      <div class="section-header ${cls}">
        <h2>${title}</h2>
        <span class="section-count">${tasks.length}</span>
      </div>
      <div class="task-list">
        ${tasks.map(t => renderCard(t)).join('')}
      </div>
    `;
  }

  function renderCard(task) {
    const charityClass = (task.Charity || '').toLowerCase().includes('1') ? 'tag-charity1' :
                         (task.Charity || '').toLowerCase().includes('2') ? 'tag-charity2' : 'tag-both';
    const charityLabel = task.Charity || 'Unknown';
    const checked = task._done ? 'checked' : '';
    const doneClass = task._done ? 'status-done' : '';
    const priorityClass = `priority-${task.Priority || 'Low'}`;

    return `
      <div class="task-card ${priorityClass} ${doneClass}" id="card-${task._id}">
        <div class="task-checkbox ${checked}" onclick="toggleTask('${task._id}')"></div>
        <div class="task-body">
          <div class="task-title">${escHtml(task.Task || '')}</div>
          <div class="task-meta">
            <span class="tag ${charityClass}">${escHtml(charityLabel)}</span>
            ${task.Category ? `<span class="tag tag-category">${escHtml(task.Category)}</span>` : ''}
          </div>
          ${task.Notes && task.Notes !== 'N/A' && task.Notes !== 'None' ? `<div class="task-notes">📝 ${escHtml(task.Notes)}</div>` : ''}
          ${task.Timestamp ? `<div class="task-time">${escHtml(task.Timestamp)}</div>` : ''}
        </div>
      </div>
    `;
  }

  function toggleTask(id) {
    const doneSet = getDoneSet();
    const task = allTasks.find(t => t._id === id);
    if (!task) return;
    if (doneSet.has(id)) { doneSet.delete(id); task._done = false; }
    else { doneSet.add(id); task._done = true; }
    saveDone(doneSet);
    renderAll();
  }

  function toggleDone() {
    doneVisible = !doneVisible;
    renderTasks();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Hide setup banner once URL is set
  if (SHEET_CSV_URL !== 'YOUR_SHEET_CSV_URL_HERE') {
    document.getElementById('setup-banner').style.display = 'none';
  }

  loadTasks();
</script>
</body>
</html>
